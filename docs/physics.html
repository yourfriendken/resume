<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenneth Jones · Physics Resume</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0b0f1a 0%, #03040a 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e6edf7;
    user-select: none;
  }
  canvas {
    display: block;
    position: absolute;
    inset: 0;
    cursor: crosshair;
  }
  .panel {
    position: fixed;
    top: 16px;
    left: 16px;
    padding: 14px 16px;
    background: rgba(10, 15, 30, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(120, 180, 255, 0.18);
    border-radius: 12px;
    font-size: 12.5px;
    line-height: 1.55;
    max-width: 280px;
    pointer-events: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .panel h1 {
    margin: 0 0 6px;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #8bd1ff;
    font-weight: 600;
  }
  .panel kbd {
    display: inline-block;
    padding: 1px 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: #c7e0ff;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
  }
  .row label {
    flex: 0 0 82px;
    color: #9fb4d4;
    font-size: 11.5px;
  }
  .row input[type="range"] {
    flex: 1;
    accent-color: #8bd1ff;
  }
  .stats {
    position: fixed;
    bottom: 12px;
    right: 14px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: rgba(180, 200, 230, 0.6);
    pointer-events: none;
  }
  .stage-caption {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 40px;
    text-align: center;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(139, 209, 255, 0.55);
    pointer-events: none;
    transition: opacity 0.6s;
  }
  button {
    background: rgba(139, 209, 255, 0.1);
    border: 1px solid rgba(139, 209, 255, 0.3);
    color: #c7e0ff;
    padding: 4px 10px;
    font-size: 11.5px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: rgba(139, 209, 255, 0.22); }
  .back {
    position: fixed;
    top: 16px;
    right: 16px;
    text-decoration: none;
    color: rgba(180, 200, 230, 0.7);
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid rgba(180, 200, 230, 0.2);
    border-radius: 8px;
    background: rgba(10, 15, 30, 0.45);
    backdrop-filter: blur(10px);
  }
  .back:hover { color: #8bd1ff; border-color: rgba(139, 209, 255, 0.4); }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="panel">
  <h1>Kenneth Jones</h1>
  <div style="color:#9fb4d4;margin-bottom:8px;">
    Software Engineer · Valparaiso, IN<br>
    <span style="font-size:11px;color:#6f87a8;">The particles below are my résumé.</span>
  </div>
  <div style="color:#9fb4d4;margin-bottom:8px;border-top:1px solid rgba(139,209,255,0.12);padding-top:8px;">
    <b style="color:#c7e0ff">Click &amp; drag</b> — scatter the text<br>
    <b style="color:#c7e0ff">Hold <kbd>Shift</kbd></b> — repel<br>
    <b style="color:#c7e0ff">Double-click</b> — explosion<br>
    <b style="color:#c7e0ff"><kbd>Space</kbd></b> — toggle gravity<br>
    <b style="color:#c7e0ff"><kbd>←</kbd> <kbd>→</kbd></b> — change stage<br>
    <b style="color:#c7e0ff"><kbd>C</kbd></b> — toggle connections
  </div>
  <div class="row">
    <label>Particles</label>
    <input type="range" id="countSlider" min="200" max="1500" value="700">
  </div>
  <div class="row">
    <label>Gravity</label>
    <input type="range" id="gravSlider" min="0" max="100" value="0">
  </div>
  <div class="row">
    <label>Attraction</label>
    <input type="range" id="attrSlider" min="0" max="100" value="55">
  </div>
  <div class="row" style="margin-top:8px;gap:6px;">
    <button id="resetBtn">Reset</button>
    <button id="burstBtn">Burst</button>
    <button id="nextBtn">Next</button>
  </div>
</div>

<a href="index.html" class="back">← résumé</a>
<div class="stage-caption" id="caption"></div>
<div class="stats" id="stats">—</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha: false });
  const statsEl = document.getElementById('stats');
  const captionEl = document.getElementById('caption');

  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    rebuildStageTargets();
  }

  // ── Resume content driving the stages ────────────────────────────────────
  // Each stage: main text (formed by particles) + small caption underneath.
  const stages = [
    { text: "KENNETH JONES",     caption: "software engineer · valparaiso, in",        big: true  },
    { text: "SOFTWARE ENGINEER", caption: "web · native · systems · integration",      big: false },
    { text: "17+ YEARS",         caption: "shipping since 2008",                       big: true  },
    { text: "INDIANA UNIVERSITY",caption: "principal engineer · native apps team",     big: false },
    { text: "PYTHON · GO · JS",  caption: "polyglot · whatever the problem needs",     big: false },
    { text: "SWIFT · DART · C#", caption: "native mobile + enterprise backends",       big: false },
    { text: "AWS · K8S · DOCKER",caption: "cloud, containers, ci/cd",                  big: false },
    { text: "M.S. DATA SCIENCE", caption: "indiana university · luddy · 2025",         big: false },
    { text: "LET'S BUILD",       caption: "work@kennethdjones.com",                    big: true  },
  ];

  let stageIdx = 0;
  let stageTimer = 0;
  const STAGE_DURATION = 6.0; // seconds

  // ── State ────────────────────────────────────────────────────────────────
  const state = {
    gravity: 0.0,
    attraction: 55,
    pointer: { x: W / 2, y: H / 2, active: false, repel: false, px: 0, py: 0 },
    showConnections: true,
    gravityOn: false, // zero-g suits text formation
    particles: [],
    targetCount: 700,
    targets: [],        // [{x, y}]
    settleTime: 0,      // seconds since stage changed (for fade-in)
  };

  const palette = [
    [200, 85, 70],
    [215, 80, 65],
    [280, 70, 70],
    [320, 70, 72],
    [170, 75, 65],
  ];

  function makeParticle(x, y, vx = 0, vy = 0) {
    const hueBase = palette[(Math.random() * palette.length) | 0];
    const jitter = (Math.random() - 0.5) * 20;
    return {
      x, y,
      px: x - vx,
      py: y - vy,
      r: 1.6 + Math.random() * 2.2,
      h: (hueBase[0] + jitter + 360) % 360,
      s: hueBase[1],
      l: hueBase[2],
      hx: x, hy: y,   // home target
      homed: false,
    };
  }

  function seed(n) {
    state.particles.length = 0;
    for (let i = 0; i < n; i++) {
      state.particles.push(makeParticle(
        Math.random() * W,
        Math.random() * H,
        (Math.random() - 0.5) * 2,
        (Math.random() - 0.5) * 2
      ));
    }
    assignTargets();
  }

  // ── Text → target positions ──────────────────────────────────────────────
  const sampleCanvas = document.createElement('canvas');
  const sampleCtx = sampleCanvas.getContext('2d');

  function sampleText(text, fontPx) {
    sampleCanvas.width = W;
    sampleCanvas.height = H;
    const c = sampleCtx;
    c.clearRect(0, 0, W, H);
    c.fillStyle = '#fff';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.font = `700 ${fontPx}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;

    // Auto-shrink if text is too wide
    while (c.measureText(text).width > W * 0.85 && fontPx > 24) {
      fontPx -= 6;
      c.font = `700 ${fontPx}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
    }
    c.fillText(text, W / 2, H / 2);

    const img = c.getImageData(0, 0, W, H).data;
    const targets = [];
    const step = Math.max(3, Math.round(fontPx / 28));
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        const a = img[(y * W + x) * 4 + 3];
        if (a > 128) targets.push({ x, y });
      }
    }
    return targets;
  }

  function rebuildStageTargets() {
    const stage = stages[stageIdx];
    const basePx = stage.big ? 180 : 130;
    const fontPx = Math.min(basePx, Math.max(60, Math.round(W / 8)));
    state.targets = sampleText(stage.text, fontPx);
    captionEl.textContent = stage.caption;
    assignTargets();
    state.settleTime = 0;
  }

  function assignTargets() {
    const parts = state.particles;
    const targets = state.targets;
    if (!targets.length) {
      for (const p of parts) p.homed = false;
      return;
    }
    // Shuffle indices so the reformation looks organic, not row-by-row.
    const order = new Array(parts.length);
    for (let i = 0; i < parts.length; i++) order[i] = i;
    for (let i = order.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [order[i], order[j]] = [order[j], order[i]];
    }
    // If we have more particles than targets, only the first N get a home;
    // the rest float freely and give the scene some liveliness.
    for (let k = 0; k < order.length; k++) {
      const p = parts[order[k]];
      if (k < targets.length) {
        const t = targets[k % targets.length];
        p.hx = t.x;
        p.hy = t.y;
        p.homed = true;
      } else {
        p.homed = false;
      }
    }
  }

  seed(state.targetCount);

  // ── Input ────────────────────────────────────────────────────────────────
  function setPointer(e, active) {
    const p = state.pointer;
    const rect = canvas.getBoundingClientRect();
    p.x = (e.clientX ?? e.touches?.[0]?.clientX) - rect.left;
    p.y = (e.clientY ?? e.touches?.[0]?.clientY) - rect.top;
    if (active !== undefined) p.active = active;
  }

  canvas.addEventListener('pointermove', (e) => setPointer(e));
  canvas.addEventListener('pointerdown', (e) => {
    setPointer(e, true);
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointerup',     () => { state.pointer.active = false; });
  canvas.addEventListener('pointercancel', () => { state.pointer.active = false; });
  canvas.addEventListener('dblclick', (e) => {
    setPointer(e);
    explode(state.pointer.x, state.pointer.y, 1);
  });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Shift') state.pointer.repel = true;
    if (e.code === 'Space') { state.gravityOn = !state.gravityOn; e.preventDefault(); }
    if (e.key === 'c' || e.key === 'C') state.showConnections = !state.showConnections;
    if (e.key === 'ArrowRight') nextStage(+1);
    if (e.key === 'ArrowLeft')  nextStage(-1);
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'Shift') state.pointer.repel = false;
  });

  function nextStage(dir = 1) {
    stageIdx = (stageIdx + dir + stages.length) % stages.length;
    rebuildStageTargets();
    stageTimer = 0;
  }

  function explode(x, y, strength = 1) {
    for (const p of state.particles) {
      const dx = p.x - x, dy = p.y - y;
      const d2 = dx * dx + dy * dy + 200;
      const f = 4500 * strength / d2;
      const d = Math.sqrt(d2);
      p.px = p.x - (dx / d) * f;
      p.py = p.y - (dy / d) * f;
    }
  }

  // ── Controls ─────────────────────────────────────────────────────────────
  const countSlider = document.getElementById('countSlider');
  const gravSlider  = document.getElementById('gravSlider');
  const attrSlider  = document.getElementById('attrSlider');

  countSlider.addEventListener('input', () => {
    state.targetCount = +countSlider.value;
    const diff = state.targetCount - state.particles.length;
    if (diff > 0) {
      for (let i = 0; i < diff; i++) {
        state.particles.push(makeParticle(
          Math.random() * W,
          Math.random() * H,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        ));
      }
    } else if (diff < 0) {
      state.particles.length = state.targetCount;
    }
    assignTargets();
  });
  gravSlider.addEventListener('input', () => {
    state.gravity = (+gravSlider.value) / 100;
    state.gravityOn = state.gravity > 0;
  });
  attrSlider.addEventListener('input', () => { state.attraction = +attrSlider.value; });
  document.getElementById('resetBtn').addEventListener('click', () => seed(state.targetCount));
  document.getElementById('burstBtn').addEventListener('click', () =>
    explode(state.pointer.x || W / 2, state.pointer.y || H / 2, 1.5));
  document.getElementById('nextBtn').addEventListener('click', () => nextStage(+1));

  window.addEventListener('resize', resize);
  resize();

  // ── Simulation ───────────────────────────────────────────────────────────
  const CELL = 60;
  const grid = new Map();
  const gridKey = (cx, cy) => cx * 16384 + cy;

  function step(dt, dtSec) {
    const p = state.pointer;
    p.px = p.x; p.py = p.y;

    const parts = state.particles;
    const g = state.gravityOn ? state.gravity : 0;
    const attrStrength = state.attraction / 55;

    // Pointer suppresses the home-spring so text scatters when grabbed,
    // then reforms when released.
    const homeStrength = p.active ? 0 : 0.018;
    const homeDamp = p.active ? 0.995 : 0.93;

    for (let i = 0; i < parts.length; i++) {
      const pt = parts[i];
      let ax = 0, ay = g;

      if (p.active) {
        const dx = p.x - pt.x;
        const dy = p.y - pt.y;
        const d2 = dx * dx + dy * dy + 120;
        const d = Math.sqrt(d2);
        const sign = p.repel ? -1 : 1;
        const f = sign * (260 * attrStrength) / d2;
        ax += (dx / d) * f * 60;
        ay += (dy / d) * f * 60;
      }

      if (pt.homed) {
        ax += (pt.hx - pt.x) * homeStrength * 60;
        ay += (pt.hy - pt.y) * homeStrength * 60;
      }

      // Per-particle damping — stronger when settled into home
      const damp = pt.homed && !p.active ? homeDamp : 0.995;
      const vx = (pt.x - pt.px) * damp;
      const vy = (pt.y - pt.py) * damp;
      pt.px = pt.x;
      pt.py = pt.y;
      pt.x += vx + ax * dt * dt;
      pt.y += vy + ay * dt * dt;

      if (pt.x < pt.r) { pt.x = pt.r; pt.px = pt.x + vx * 0.6; }
      else if (pt.x > W - pt.r) { pt.x = W - pt.r; pt.px = pt.x + vx * 0.6; }
      if (pt.y < pt.r) { pt.y = pt.r; pt.py = pt.y + vy * 0.6; }
      else if (pt.y > H - pt.r) { pt.y = H - pt.r; pt.py = pt.y + vy * 0.6; }
    }

    // Collision grid (loose — homed particles don't need tight packing)
    grid.clear();
    for (let i = 0; i < parts.length; i++) {
      const pt = parts[i];
      const cx = (pt.x / CELL) | 0;
      const cy = (pt.y / CELL) | 0;
      const k = gridKey(cx, cy);
      let cell = grid.get(k);
      if (!cell) { cell = []; grid.set(k, cell); }
      cell.push(i);
      pt._cx = cx; pt._cy = cy;
    }

    for (let i = 0; i < parts.length; i++) {
      const a = parts[i];
      for (let ox = -1; ox <= 1; ox++) {
        for (let oy = -1; oy <= 1; oy++) {
          const cell = grid.get(gridKey(a._cx + ox, a._cy + oy));
          if (!cell) continue;
          for (const j of cell) {
            if (j <= i) continue;
            const b = parts[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const rSum = a.r + b.r;
            const d2 = dx * dx + dy * dy;
            if (d2 > 0 && d2 < rSum * rSum) {
              const d = Math.sqrt(d2);
              const overlap = (rSum - d) * 0.5;
              const nx = dx / d, ny = dy / d;
              a.x -= nx * overlap;
              a.y -= ny * overlap;
              b.x += nx * overlap;
              b.y += ny * overlap;
            }
          }
        }
      }
    }

    // Auto-advance stage when not interacting
    if (!p.active) {
      stageTimer += dtSec;
      if (stageTimer > STAGE_DURATION) nextStage(+1);
    }
    state.settleTime += dtSec;
  }

  // ── Render ───────────────────────────────────────────────────────────────
  let last = performance.now();
  let frames = 0, fpsTimer = 0, fps = 0;

  function render(now) {
    const rawDt = (now - last);
    const dt = Math.min(rawDt / 16.6667, 2.5);
    const dtSec = rawDt / 1000;
    last = now;
    frames++;
    fpsTimer += dt;
    if (fpsTimer > 30) { fps = Math.round(frames * 60 / fpsTimer); frames = 0; fpsTimer = 0; }

    step(dt, dtSec);

    ctx.fillStyle = 'rgba(3, 4, 10, 0.24)';
    ctx.fillRect(0, 0, W, H);

    const parts = state.particles;

    if (state.showConnections) {
      ctx.lineWidth = 1;
      const MAX_D2 = 90 * 90;
      for (const [, cell] of grid) {
        for (let i = 0; i < cell.length; i++) {
          const a = parts[cell[i]];
          for (let ox = 0; ox <= 1; ox++) {
            for (let oy = (ox === 0 ? 0 : -1); oy <= 1; oy++) {
              const cell2 = grid.get(gridKey(a._cx + ox, a._cy + oy));
              if (!cell2) continue;
              for (const j of cell2) {
                if (j <= cell[i]) continue;
                const b = parts[j];
                const dx = b.x - a.x, dy = b.y - a.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < MAX_D2) {
                  const alpha = (1 - d2 / MAX_D2) * 0.28;
                  ctx.strokeStyle = `hsla(${(a.h + b.h) / 2}, 80%, 70%, ${alpha})`;
                  ctx.beginPath();
                  ctx.moveTo(a.x, a.y);
                  ctx.lineTo(b.x, b.y);
                  ctx.stroke();
                }
              }
            }
          }
        }
      }
    }

    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < parts.length; i++) {
      const pt = parts[i];
      const vx = pt.x - pt.px, vy = pt.y - pt.py;
      const speed = Math.min(Math.sqrt(vx * vx + vy * vy), 8);
      const glow = 1 + speed * 0.8;

      const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, pt.r * 4 * glow);
      grad.addColorStop(0, `hsla(${pt.h}, ${pt.s}%, ${Math.min(pt.l + speed * 4, 90)}%, 0.9)`);
      grad.addColorStop(0.4, `hsla(${pt.h}, ${pt.s}%, ${pt.l}%, 0.25)`);
      grad.addColorStop(1, `hsla(${pt.h}, ${pt.s}%, ${pt.l}%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * 4 * glow, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `hsl(${pt.h}, 100%, 92%)`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    if (state.pointer.active) {
      const p = state.pointer;
      const ringColor = p.repel ? '255, 120, 140' : '139, 209, 255';
      ctx.strokeStyle = `rgba(${ringColor}, 0.6)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 22 + Math.sin(now / 140) * 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(${ringColor}, 0.25)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 42, 0, Math.PI * 2);
      ctx.stroke();
    }

    statsEl.textContent = `"${stages[stageIdx].text}" · ${parts.length} particles · ${fps || '—'} fps`;
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
